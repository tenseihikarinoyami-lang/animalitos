<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Plataforma de monitoreo y analitica para Lotto Activo, La Granjita y Lotto Activo Internacional."
    />
    <meta name="theme-color" content="#08111f" />
    <script>
      (function () {
        var host = window.location.hostname
        var enablePwa =
          host === 'localhost' ||
          host === '127.0.0.1' ||
          host === 'animalitos-frontend.vercel.app'
        if (!enablePwa) return
        var manifestLink = document.createElement('link')
        manifestLink.rel = 'manifest'
        manifestLink.href = '/manifest.webmanifest'
        document.head.appendChild(manifestLink)
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <title>Animalitos Monitor</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
